<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Axis"/>
<meta name="theme-color" content="#0d0d0d"/>
<title>Axis</title>
<link href="https://fonts.googleapis.com/css2?family=Unica+One&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root{--accent2:#c8ff00;--radius:14px;--sidebar-w:220px;--transition:0.22s cubic-bezier(.4,0,.2,1);--bottom-nav-h:64px;--safe-bottom:env(safe-area-inset-bottom,0px);}
  [data-theme="dark"]{--bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;--text:#f0f0f0;--muted:#666;--card-bg:#161616;}
  [data-theme="light"]{--bg:#f2f2f2;--surface:#ffffff;--surface2:#e8e8e8;--border:#d5d5d5;--text:#111111;--muted:#999;--card-bg:#ffffff;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;height:-webkit-fill-available;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;height:-webkit-fill-available;overflow:hidden;transition:background var(--transition),color var(--transition);}

  /* AUTH */
  .auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px;}
  .auth-screen.hidden{display:none;}
  .auth-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px 32px;text-align:center;}
  .auth-logo{font-family:'Unica One',sans-serif;font-size:28px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text);display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;}
  .auth-logo-dot{width:10px;height:10px;border-radius:50%;background:var(--accent2);}
  .auth-subtitle{font-size:13px;color:var(--muted);margin-bottom:32px;}
  .auth-error{background:rgba(255,60,60,0.1);border:1px solid rgba(255,60,60,0.3);border-radius:10px;padding:12px 14px;font-size:13px;color:#ff5555;margin-bottom:16px;display:none;text-align:left;}
  .auth-error.show{display:block;}
  .google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 20px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:border-color 0.15s,background 0.15s;-webkit-tap-highlight-color:transparent;}
  .google-btn:hover{border-color:var(--accent2);background:var(--surface);}
  .auth-note{font-size:11px;color:var(--muted);margin-top:16px;}

  /* RICH TEXT EDITOR */
  .editor{width:100%;min-height:120px;max-height:280px;overflow-y:auto;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.7;outline:none;transition:border-color 0.15s;-webkit-user-select:text;user-select:text;}
  .editor:focus{border-color:var(--accent2);}
  .editor:empty:before{content:attr(data-placeholder);color:var(--muted);pointer-events:none;}
  .editor h1{font-family:'Unica One',sans-serif;font-size:20px;letter-spacing:0.04em;margin:4px 0 2px;}
  .editor h2{font-family:'Unica One',sans-serif;font-size:16px;letter-spacing:0.04em;margin:4px 0 2px;}
  .editor ul{padding-left:20px;margin:2px 0;}
  .editor ol{padding-left:20px;margin:2px 0;}
  .editor li{margin:2px 0;}
  .editor li.checked{text-decoration:line-through;opacity:0.5;}
  .editor strong{font-weight:700;}
  .editor .cb-wrap{display:flex;align-items:flex-start;gap:8px;margin:2px 0;list-style:none;padding-left:0;}
  .editor .cb-wrap input[type=checkbox]{margin-top:4px;accent-color:var(--accent2);width:15px;height:15px;flex-shrink:0;cursor:pointer;}
  .editor .cb-text.checked{text-decoration:line-through;opacity:0.5;}
  /* Rendered card content */
  .card-desc h1{font-family:'Unica One',sans-serif;font-size:17px;letter-spacing:0.04em;color:var(--text);margin-bottom:4px;}
  .card-desc h2{font-family:'Unica One',sans-serif;font-size:14px;letter-spacing:0.04em;color:var(--text);margin-bottom:2px;}
  .card-desc ul,.card-desc ol{padding-left:18px;margin:2px 0;}
  .card-desc li{margin:1px 0;font-size:13px;color:var(--muted);}
  .card-desc li.checked{text-decoration:line-through;opacity:0.4;}
  .card-desc strong{font-weight:700;color:var(--text);}
  .card-desc .cb-wrap{display:flex;align-items:flex-start;gap:6px;margin:1px 0;}
  .card-desc .cb-wrap input{accent-color:var(--accent2);width:13px;height:13px;margin-top:2px;flex-shrink:0;}
  .card-desc .cb-text.checked{text-decoration:line-through;opacity:0.4;}

  /* SIDEBAR */
  .sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:28px 0 20px;flex-shrink:0;position:relative;z-index:1;}
  .logo{font-family:'Unica One',sans-serif;font-size:20px;letter-spacing:0.12em;text-transform:uppercase;padding:0 24px 32px;color:var(--text);display:flex;align-items:center;gap:10px;}
  .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);}
  .nav-section{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);padding:0 24px 10px;margin-top:8px;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 24px;cursor:pointer;font-size:14px;color:var(--muted);border-left:3px solid transparent;transition:all var(--transition);user-select:none;}
  .nav-item:hover{color:var(--text);background:var(--surface2);}
  .nav-item.active{color:var(--text);border-left-color:var(--accent2);background:var(--surface2);font-weight:500;}
  .nav-icon{font-size:16px;flex-shrink:0;}
  .task-badge{margin-left:auto;background:var(--accent2);color:#000;font-size:10px;font-weight:700;border-radius:999px;padding:1px 7px;display:none;}
  .task-badge.visible{display:inline-block;}
  .sidebar-bottom{margin-top:auto;padding:20px 24px 0;display:flex;flex-direction:column;gap:14px;}
  .theme-toggle{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none;}
  .toggle-track{width:38px;height:20px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;position:relative;flex-shrink:0;}
  .toggle-thumb{position:absolute;top:3px;left:3px;width:12px;height:12px;border-radius:50%;background:var(--accent2);transition:transform var(--transition);}
  [data-theme="light"] .toggle-thumb{transform:translateX(18px);}
  .signout-btn{background:none;border:none;color:var(--muted);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:left;padding:0;transition:color 0.15s;}
  .signout-btn:hover{color:#ff5555;}

  /* HAMBURGER */
  .hamburger-btn{width:38px;height:38px;border:1px solid var(--border);border-radius:10px;background:var(--surface);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
  .hamburger-btn:hover{border-color:var(--accent2);}
  .hamburger-btn span{display:block;width:16px;height:1.5px;background:var(--text);border-radius:2px;}
  .menu-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:6px;min-width:200px;z-index:200;box-shadow:0 12px 40px rgba(0,0,0,0.35);opacity:0;pointer-events:none;transform:translateY(-8px) scale(0.97);transition:opacity 0.15s,transform 0.15s;transform-origin:top right;}
  .menu-dropdown.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1);}
  .menu-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:9px;cursor:pointer;font-size:14px;color:var(--text);transition:background 0.12s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;}
  .menu-item:hover{background:var(--surface2);}
  .menu-item.danger{color:#ff5555;}
  .menu-item.danger:hover{background:rgba(255,60,60,0.08);}
  .menu-icon{font-size:16px;flex-shrink:0;}
  .menu-divider{height:1px;background:var(--border);margin:4px 0;}
  .menu-theme-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:9px;cursor:pointer;font-size:14px;color:var(--text);transition:background 0.12s;}
  .menu-theme-row:hover{background:var(--surface2);}
  .topbar-right{position:relative;display:flex;align-items:center;gap:10px;}

  /* BOTTOM NAV */
  .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:calc(var(--bottom-nav-h) + var(--safe-bottom));background:var(--surface);border-top:1px solid var(--border);z-index:50;padding-bottom:var(--safe-bottom);}
  .bottom-nav-inner{display:flex;align-items:stretch;height:var(--bottom-nav-h);}
  .bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--muted);border:none;background:none;-webkit-tap-highlight-color:transparent;position:relative;padding:8px 4px;}
  .bottom-nav-item.active{color:var(--accent2);}
  .bottom-nav-item .bn-icon{font-size:20px;line-height:1;}
  .bottom-nav-item .bn-label{font-size:10px;font-family:'DM Sans',sans-serif;}
  .bottom-nav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--accent2);color:#000;font-size:9px;font-weight:700;border-radius:999px;padding:1px 5px;display:none;}
  .bottom-nav-badge.visible{display:block;}

  /* MAIN */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;}
  .section-title{font-family:'Unica One',sans-serif;font-size:24px;letter-spacing:0.04em;}
  .add-btn{display:flex;align-items:center;gap:8px;background:var(--accent2);color:#000;border:none;border-radius:var(--radius);padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
  .add-btn:active{opacity:0.85;}

  /* LOADING BAR */
  .loading-bar{position:fixed;top:0;left:0;height:3px;background:var(--accent2);width:0%;z-index:300;}

  /* GRID */
  .grid-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px;scrollbar-width:thin;}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
  .card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;animation:fadeUp 0.3s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .card-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;}
  .card-body{padding:14px;}
  .card-no-img .card-body{padding-top:18px;}
  .card-desc{font-size:13px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .card-actions{display:flex;gap:8px;padding:10px 14px 12px;border-top:1px solid var(--border);}
  .card-action-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:6px 8px;border-radius:6px;transition:color 0.15s;-webkit-tap-highlight-color:transparent;}
  .card-action-btn:hover{color:var(--text);}
  .empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-state .empty-icon{font-size:48px;margin-bottom:16px;}
  .empty-state p{font-size:14px;line-height:1.7;}

  /* TASKS */
  .tasks-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px;display:none;}
  .tasks-area.active{display:block;}
  .grid-area.tasks-hidden{display:none;}
  .task-tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;width:fit-content;margin-bottom:20px;}
  .task-tab{padding:8px 20px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);border:none;background:none;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;}
  .task-tab.active{background:var(--accent2);color:#000;}
  .task-list{display:flex;flex-direction:column;gap:10px;}
  .task-item{display:flex;align-items:flex-start;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;animation:fadeUp 0.25s ease both;transition:opacity 0.3s;}
  .task-item.completing{opacity:0.3;}
  .task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:none;-webkit-tap-highlight-color:transparent;}
  .task-check.checked{background:var(--accent2);border-color:var(--accent2);}
  .task-check.checked::after{content:'✓';font-size:12px;color:#000;font-weight:700;}
  .task-content{flex:1;min-width:0;}
  .task-name{font-size:14px;font-weight:500;margin-bottom:4px;word-break:break-word;}
  .task-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .task-time,.task-date{font-size:11px;color:var(--muted);}
  .priority-badge{font-size:10px;text-transform:uppercase;padding:2px 8px;border-radius:999px;font-weight:600;}
  .priority-high{background:rgba(255,60,60,0.15);color:#ff5555;border:1px solid rgba(255,60,60,0.3);}
  .priority-medium{background:rgba(255,180,0,0.15);color:#ffb300;border:1px solid rgba(255,180,0,0.3);}
  .priority-low{background:rgba(100,200,100,0.15);color:#66cc66;border:1px solid rgba(100,200,100,0.3);}
  .reminder-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);flex-shrink:0;margin-top:6px;}
  .task-delete-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px;border-radius:6px;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
  .task-delete-btn:hover{color:#ff4444;}
  .tasks-empty{text-align:center;padding:60px 20px;color:var(--muted);}
  .tasks-empty .empty-icon{font-size:48px;margin-bottom:16px;}
  .tasks-empty p{font-size:14px;line-height:1.7;}

  /* MODALS */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.2s;backdrop-filter:blur(6px);}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 24px calc(24px + var(--safe-bottom));width:100%;max-width:560px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(40px);transition:transform 0.25s cubic-bezier(.4,0,.2,1);}
  .modal-overlay.open .modal{transform:translateY(0);}
  .modal-handle{width:40px;height:4px;background:var(--border);border-radius:999px;margin:0 auto 20px;}
  .modal-title{font-family:'Unica One',sans-serif;font-size:20px;letter-spacing:0.04em;margin-bottom:20px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .field input,.field textarea,.field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:border-color 0.15s;resize:none;-webkit-appearance:none;}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent2);}
  .field select option{background:var(--surface);}
  .field-row{display:flex;gap:12px;}
  .field-row .field{flex:1;}
  .img-upload-area{width:100%;aspect-ratio:16/7;border:2px dashed var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;background:var(--surface2);-webkit-tap-highlight-color:transparent;}
  .img-upload-area:active{border-color:var(--accent2);}
  .img-upload-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .img-upload-area span{font-size:13px;color:var(--muted);z-index:1;}
  .img-upload-area .upload-icon{font-size:28px;margin-bottom:8px;z-index:1;}
  #img-input{display:none;}
  .modal-actions{display:flex;gap:12px;margin-top:24px;}
  .btn-cancel{flex:1;background:none;border:1px solid var(--border);border-radius:12px;padding:14px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .btn-save{flex:2;background:var(--accent2);border:none;border-radius:12px;padding:14px;color:#000;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .btn-save:disabled{opacity:0.5;cursor:not-allowed;}
  .view-modal .view-img{width:100%;max-height:240px;object-fit:cover;border-radius:12px;margin-bottom:16px;}
  .view-modal .view-desc{font-size:14px;line-height:1.75;color:var(--text);white-space:pre-wrap;}

  /* TOAST */
  .toast{position:fixed;bottom:calc(var(--bottom-nav-h) + var(--safe-bottom) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--accent2);border-radius:12px;padding:12px 20px;font-size:13px;color:var(--text);z-index:999;opacity:0;transition:all 0.3s;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast-title{font-weight:600;margin-bottom:3px;color:var(--accent2);font-size:11px;text-transform:uppercase;}

  /* DESKTOP */
  @media(min-width:640px){
    .sidebar{display:flex;}
    .bottom-nav{display:none;}
    .modal-overlay{align-items:center;}
    .modal{border-radius:20px;padding:32px;width:min(520px,92vw);max-height:88vh;transform:scale(0.95);}
    .modal-overlay.open .modal{transform:scale(1);}
    .modal-handle{display:none;}
    .grid-area,.tasks-area{padding:28px 32px;}
    .topbar{padding:22px 32px 18px;}
    .toast{bottom:28px;}
  }
  /* MOBILE */
  @media(max-width:639px){
    .sidebar{display:none;}
    .bottom-nav{display:block;}
    .main{padding-bottom:calc(var(--bottom-nav-h) + var(--safe-bottom));}
    .grid-area,.tasks-area{padding:16px;}
    .topbar{padding:calc(16px + env(safe-area-inset-top,0px)) 16px 12px;}
    .section-title{font-size:20px;}
    .add-btn{padding:9px 14px;font-size:12px;}
    .card-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
    .card-body{padding:10px;}
    .card-actions{padding:8px 10px 10px;gap:4px;}
    .card-action-btn{font-size:12px;padding:5px 6px;}
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<canvas id="starCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo"><span class="auth-logo-dot"></span> Axis</div>
    <div class="auth-subtitle">Your personal dashboard</div>
    <div id="authError" class="auth-error"></div>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Continue with Google
    </button>
    <div class="auth-note">Only approved accounts can sign in</div>
  </div>
</div>

<div class="loading-bar" id="loadingBar"></div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo"><span class="logo-dot"></span> Axis</div>
  <div class="nav-section">Tasks</div>
  <div class="nav-item" data-section="Tasks" data-type="tasks"><span class="nav-icon">✅</span> Tasks<span class="task-badge" id="taskBadge">0</span></div>
  <div class="nav-section" style="margin-top:12px">Sections</div>
  <div class="nav-item active" data-section="Work" data-type="board"><span class="nav-icon">💼</span> Work</div>

<script>
  // ── CONFIG ──
  const BASE = 'https://mfhbtholmjznkippcudp.supabase.co';
  const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1maGJ0aG9sbWp6bmtpcHBjdWRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2OTEyMzMsImV4cCI6MjA4NjI2NzIzM30.NR-8q726QZlqtjiYcTtipjXLrIKu0_qKwyjqf31AN1o';

  let accessToken = localStorage.getItem('axis_token') || null;
  let currentUserId = localStorage.getItem('axis_uid') || null;
  let cards=[], tasks=[], currentSection='Work', currentView='board', currentTaskTab='today', editingId=null, pendingImg=null;

  // ── API helpers — pure REST, no SDK, no lock issues ──
  function authHeaders(){
    return {
      'Content-Type':'application/json',
      'apikey': ANON,
      'Authorization': 'Bearer ' + (accessToken || ANON)
    };
  }

  // Silently refresh the token using the refresh_token stored in localStorage
  async function refreshToken(){
    const refresh = localStorage.getItem('axis_refresh');
    if(!refresh) { signOut(); return false; }
    try{
      const r = await fetch(`${BASE}/auth/v1/token?grant_type=refresh_token`, {
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':ANON},
        body: JSON.stringify({refresh_token: refresh})
      });
      const d = await r.json();
      if(!r.ok) throw new Error('refresh failed');
      accessToken = d.access_token;
      localStorage.setItem('axis_token', accessToken);
      if(d.refresh_token) localStorage.setItem('axis_refresh', d.refresh_token);
      return true;
    } catch(e){
      signOut(); return false;
    }
  }

  // Wrapper: if any request gets JWT expired, refresh once and retry
  async function apiFetch(url, options={}){
    const makeHeaders = () => ({...authHeaders(), ...(options.headers||{})});
    let r = await fetch(url, {...options, headers: makeHeaders()});
    if(r.status === 401 || r.status === 403){
      // Token expired — try to refresh
      const ok = await refreshToken();
      if(!ok){
        // No refresh token available — force sign out with friendly message
        alert('Your session expired. Please sign in again.');
        signOut();
        throw new Error('Session expired');
      }
      // Retry with new token
      r = await fetch(url, {...options, headers: makeHeaders()});
    }
    if(!r.ok){
      const txt = await r.text();
      // If still JWT related after refresh attempt, force sign out
      if(txt.includes('JWT') || txt.includes('expired')){
        alert('Your session expired. Please sign in again.');
        signOut();
        throw new Error('Session expired');
      }
      throw new Error(txt);
    }
    return r;
  }

  async function dbGet(table, query=''){
    const r = await apiFetch(`${BASE}/rest/v1/${table}?${query}`);
    return r.json();
  }
  async function dbInsert(table, body){
    await apiFetch(`${BASE}/rest/v1/${table}`, {
      method:'POST', headers:{'Prefer':'return=minimal'}, body: JSON.stringify(body)
    });
  }
  async function dbUpdate(table, id, body){
    await apiFetch(`${BASE}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
      method:'PATCH', headers:{'Prefer':'return=minimal'}, body: JSON.stringify(body)
    });
  }
  async function dbDelete(table, id){
    await apiFetch(`${BASE}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`, {
      method:'DELETE'
    });
  }

  // ── AUTH via Google OAuth ──
  function signInWithGoogle(){
    // Redirect to Supabase Google OAuth — it handles everything
    const redirectTo = encodeURIComponent(window.location.origin + window.location.pathname);
    window.location.href = `${BASE}/auth/v1/authorize?provider=google&redirect_to=${redirectTo}`;
  }

  function signOut(){
    localStorage.removeItem('axis_token');
    localStorage.removeItem('axis_uid');
    localStorage.removeItem('axis_refresh');
    accessToken = null; currentUserId = null;
    cards=[]; tasks=[];
    document.getElementById('authScreen').classList.remove('hidden');
  }

  function showApp(){
    document.getElementById('authScreen').classList.add('hidden');
    initApp();
  }

  function showAuthError(msg){
    const e=document.getElementById('authError');
    e.textContent=msg;e.classList.add('show');
  }

  // Handle OAuth callback — Supabase puts tokens in the URL hash after Google login
  async function handleOAuthCallback(){
    const hash = window.location.hash;
    if(!hash) return false;
    const params = new URLSearchParams(hash.replace('#',''));
    const token = params.get('access_token');
    const refresh = params.get('refresh_token');
    const uid = params.get('user_id') || null;
    if(!token) return false;
    accessToken = token;
    if(refresh) localStorage.setItem('axis_refresh', refresh);
    localStorage.setItem('axis_token', token);
    // Get user ID from the token payload
    try{
      const payload = JSON.parse(atob(token.split('.')[1]));
      currentUserId = payload.sub;
      localStorage.setItem('axis_uid', currentUserId);
    } catch(e){}
    // Clean the URL so tokens don't stay visible
    history.replaceState(null, '', window.location.pathname);
    return true;
  }

  // ── LOADING BAR — simple & reliable ──
  const lb = document.getElementById('loadingBar');
  let lbTimer = null;
  function loadStart(){
    if(lbTimer){clearTimeout(lbTimer);lbTimer=null;}
    lb.style.transition = 'none';
    lb.style.width = '0%';
    lb.offsetWidth; // force reflow
    lb.style.transition = 'width 0.6s ease';
    lb.style.width = '75%';
  }
  function loadDone(){
    lb.style.transition = 'width 0.2s ease';
    lb.style.width = '100%';
    lbTimer = setTimeout(()=>{
      lb.style.transition = 'none';
      lb.style.width = '0%';
      lbTimer = null;
    }, 300);
  }

  // ── THEME ──
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme',t);
    const l=document.getElementById('themeLabel'); if(l) l.textContent=t==='dark'?'Dark':'Light';
    const ml=document.getElementById('menuThemeLabel'); if(ml) ml.textContent=t==='dark'?'Dark Mode':'Light Mode';
    localStorage.setItem('axis_theme',t);
  }
  applyTheme(localStorage.getItem('axis_theme')||'dark');
  function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
  document.getElementById('themeToggle').addEventListener('click',toggleTheme);

  // ── HAMBURGER ──
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const menuDropdown = document.getElementById('menuDropdown');
  hamburgerBtn.addEventListener('click',e=>{e.stopPropagation();menuDropdown.classList.toggle('open');});
  document.addEventListener('click',()=>menuDropdown.classList.remove('open'));
  menuDropdown.addEventListener('click',e=>e.stopPropagation());
  function closeMenu(){menuDropdown.classList.remove('open');}

  // ── NAV ──
  function switchSection(section, type){
    currentSection=section; currentView=type;
    document.getElementById('sectionTitle').textContent=section;
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.section===section));
    document.querySelectorAll('.bottom-nav-item').forEach(n=>n.classList.toggle('active',n.dataset.section===section));
    if(type==='tasks'){
      document.getElementById('gridArea').classList.add('tasks-hidden');
      document.getElementById('tasksArea').classList.add('active');
      document.getElementById('addBtn').textContent='+ Add Task';
      renderTasks();
    } else {
      document.getElementById('gridArea').classList.remove('tasks-hidden');
      document.getElementById('tasksArea').classList.remove('active');
      document.getElementById('addBtn').textContent='+ Add Card';
      renderGrid();
    }
  }
  document.querySelectorAll('.nav-item,.bottom-nav-item').forEach(item=>{
    item.addEventListener('click',()=>switchSection(item.dataset.section,item.dataset.type));
  });
  document.getElementById('addBtn').addEventListener('click',()=>{
    if(currentView==='tasks') openTaskModal();
    else {
      resetCardModal();
      document.getElementById('addModal').classList.add('open');
      setTimeout(()=>{ document.getElementById('cardDesc').focus(); }, 300);
    }
  });
  // Init editor once
  initEditor(document.getElementById('cardDesc'));

  // ── GRID ──
  function renderGrid(){
    const grid = document.getElementById('cardGrid');
    const sc = cards.filter(c=>c.section===currentSection);
    if(!sc.length){
      grid.innerHTML=`<div class="empty-state"><div class="empty-icon">✦</div><p>No cards yet in <strong>${esc(currentSection)}</strong>.<br>Tap <strong>+ Add Card</strong> to start.</p></div>`;
      return;
    }
    grid.innerHTML = sc.map((c,i)=>`
      <div class="card ${c.img_data?'':'card-no-img'}" style="animation-delay:${i*0.05}s">
        ${c.img_data?`<img class="card-img" src="${c.img_data}" alt=""/>`:''}
        <div class="card-body">${c.description?`<div class="card-desc">${markdownToHtml(c.description)}</div>`:''}</div>
        <div class="card-actions">
          <button class="card-action-btn" onclick="openView('${c.id}')">👁 View</button>
          <button class="card-action-btn" onclick="openEdit('${c.id}')">✏️ Edit</button>
          <button class="card-action-btn" onclick="deleteCard('${c.id}')">🗑</button>
        </div>
      </div>`).join('');
  }

  function openView(id){
    const c=cards.find(x=>x.id===id); if(!c) return;
    document.getElementById('viewTitle').textContent=c.section;
    const img=document.getElementById('viewImg');
    if(c.img_data){img.src=c.img_data;img.style.display='block';}else img.style.display='none';
    document.getElementById('viewDesc').innerHTML=markdownToHtml(c.description||'');
    document.getElementById('viewModal').classList.add('open');
  }
  document.getElementById('closeView').addEventListener('click',()=>document.getElementById('viewModal').classList.remove('open'));
  document.getElementById('viewModal').addEventListener('click',e=>{if(e.target===document.getElementById('viewModal'))document.getElementById('viewModal').classList.remove('open');});

  function resetCardModal(){
    pendingImg=null; editingId=null;
    document.getElementById('cardDesc').innerHTML='';
    document.getElementById('previewImg').style.display='none';
    document.getElementById('img-input').value='';
    document.getElementById('modalTitle').textContent='New Card';
    document.getElementById('photoField').style.display='block';
  }
  document.getElementById('cancelModal').addEventListener('click',()=>document.getElementById('addModal').classList.remove('open'));
  document.getElementById('addModal').addEventListener('click',e=>{if(e.target===document.getElementById('addModal'))document.getElementById('addModal').classList.remove('open');});
  document.getElementById('uploadArea').addEventListener('click',()=>document.getElementById('img-input').click());
  document.getElementById('img-input').addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{pendingImg=ev.target.result;const pi=document.getElementById('previewImg');pi.src=pendingImg;pi.style.display='block';};
    r.readAsDataURL(f);
  });

  document.getElementById('saveCard').addEventListener('click',async()=>{
    const editorEl = document.getElementById('cardDesc');
    const desc = editorToMarkdown(editorEl);
    if(!desc.trim() && !pendingImg){ alert('Add a photo or some text first.'); return; }
    const btn = document.getElementById('saveCard');
    btn.disabled = true; btn.textContent = 'Saving...';
    loadStart();
    try{
      if(editingId){
        const upd = {description: desc};
        if(pendingImg !== null) upd.img_data = pendingImg;
        await dbUpdate('cards', editingId, upd);
        const idx = cards.findIndex(c=>c.id===editingId);
        if(idx>-1) cards[idx] = {...cards[idx], ...upd};
      } else {
        const nc = {
          id: Date.now().toString(),
          section: currentSection,
          img_data: pendingImg || null,
          description: desc || null,
          tags: [],
          user_id: currentUserId,
          created_at: new Date().toISOString()
        };
        await dbInsert('cards', nc);
        cards.push(nc);
      }
      loadDone();
      renderGrid();
      document.getElementById('addModal').classList.remove('open');
    } catch(e){
      loadDone();
      alert('Save failed: ' + e.message);
    }
    btn.disabled = false; btn.textContent = 'Save';
  });

  function openEdit(id){
    const c=cards.find(x=>x.id===id); if(!c) return;
    resetCardModal(); editingId=id;
    document.getElementById('modalTitle').textContent='Edit Card';

    document.getElementById('addModal').classList.add('open');
  }

  async function deleteCard(id){
    if(!confirm('Delete this card?')) return;
    loadStart();
    try{ await dbDelete('cards', id); cards=cards.filter(c=>c.id!==id); renderGrid(); }
    catch(e){ alert('Error: '+e.message); }
    loadDone();
  }

  // ── TASKS ──
  function openTaskModal(){
    document.getElementById('taskName').value='';
    document.getElementById('taskPriority').value='medium';
    document.getElementById('taskDate').value=todayStr();
    document.getElementById('taskTime').value='';
    document.getElementById('taskModal').classList.add('open');
  }
  document.getElementById('cancelTaskModal').addEventListener('click',()=>document.getElementById('taskModal').classList.remove('open'));
  document.getElementById('taskModal').addEventListener('click',e=>{if(e.target===document.getElementById('taskModal'))document.getElementById('taskModal').classList.remove('open');});

  document.getElementById('saveTask').addEventListener('click',async()=>{
    const name = document.getElementById('taskName').value.trim(); if(!name) return;
    const btn = document.getElementById('saveTask');
    btn.disabled=true; btn.textContent='Saving...';
    loadStart();
    try{
      const task = {
        id: Date.now().toString(),
        name,
        priority: document.getElementById('taskPriority').value,
        date: document.getElementById('taskDate').value,
        time: document.getElementById('taskTime').value || null,
        done: false,
        user_id: currentUserId,
        created_at: new Date().toISOString()
      };
      await dbInsert('tasks', task);
      tasks.push(task);
      scheduleReminder(task);
      updateTaskBadge();
      currentTaskTab = task.date <= todayStr() ? 'today' : 'future';
      document.getElementById('tabToday').classList.toggle('active', currentTaskTab==='today');
      document.getElementById('tabFuture').classList.toggle('active', currentTaskTab==='future');
      loadDone(); renderTasks();
      document.getElementById('taskModal').classList.remove('open');
    } catch(e){ loadDone(); alert('Error saving task: '+e.message); }
    btn.disabled=false; btn.textContent='Save Task';
  });

  document.getElementById('tabToday').addEventListener('click',()=>{currentTaskTab='today';document.getElementById('tabToday').classList.add('active');document.getElementById('tabFuture').classList.remove('active');renderTasks();});
  document.getElementById('tabFuture').addEventListener('click',()=>{currentTaskTab='future';document.getElementById('tabFuture').classList.add('active');document.getElementById('tabToday').classList.remove('active');renderTasks();});

  function renderTasks(){
    const list = document.getElementById('taskList');
    const today = todayStr();
    const filtered = tasks.filter(t=>{
      if(t.done) return false;
      return currentTaskTab==='today' ? t.date<=today : t.date>today;
    }).sort((a,b)=>{const p={high:0,medium:1,low:2};return p[a.priority]-p[b.priority]||a.date.localeCompare(b.date);});
    if(!filtered.length){
      list.innerHTML=`<div class="tasks-empty"><div class="empty-icon">${currentTaskTab==='today'?'📋':'📅'}</div><p>${currentTaskTab==='today'?'No tasks for today.<br>Tap <strong>+ Add Task</strong> to add one.':'No future tasks yet.'}</p></div>`;
      return;
    }
    list.innerHTML = filtered.map((t,i)=>`
      <div class="task-item" id="task-${t.id}" style="animation-delay:${i*0.04}s">
        <div class="task-check" onclick="toggleTask('${t.id}')"></div>
        <div class="task-content">
          <div class="task-name">${esc(t.name)}</div>
          <div class="task-meta">
            <span class="priority-badge priority-${t.priority}">${t.priority}</span>

            ${t.time?`<span class="task-time">⏰ ${fmtTime(t.time)}</span>`:''}
          </div>
        </div>
        ${t.time?`<div class="reminder-dot"></div>`:''}
        <button class="task-delete-btn" onclick="deleteTask('${t.id}')">🗑</button>
      </div>`).join('');
  }

  async function toggleTask(id){
    const el = document.getElementById('task-'+id); if(el) el.classList.add('completing');
    try{ await dbUpdate('tasks', id, {done:true}); }catch(e){}
    const t = tasks.find(x=>x.id===id); if(t) t.done=true;
    updateTaskBadge();
    setTimeout(()=>renderTasks(), 400);
  }

  async function deleteTask(id){
    loadStart();
    try{ await dbDelete('tasks', id); tasks=tasks.filter(x=>x.id!==id); }
    catch(e){ alert('Error: '+e.message); }
    loadDone(); updateTaskBadge(); renderTasks();
  }

  function fmtDate(s){if(!s)return'';return new Date(s+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
  function fmtTime(s){if(!s)return'';const[h,m]=s.split(':');const hr=parseInt(h);return`${hr%12||12}:${m} ${hr>=12?'PM':'AM'}`;}
  function todayStr(){return new Date().toISOString().slice(0,10);}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function updateTaskBadge(){
    const today=todayStr(); const count=tasks.filter(t=>t.date<=today&&!t.done).length;
    const b=document.getElementById('taskBadge'); b.textContent=count; b.classList.toggle('visible',count>0);
    const mb=document.getElementById('mobileTaskBadge'); mb.textContent=count; mb.classList.toggle('visible',count>0);
  }

  function scheduleReminder(task){
    if(!task.date||!task.time) return;
    const diff=new Date(`${task.date}T${task.time}`)-new Date();
    if(diff<=0) return;
    if(Notification.permission==='granted') setTimeout(()=>new Notification('⏰ Axis Reminder',{body:task.name}),diff);
    else if(Notification.permission!=='denied') Notification.requestPermission().then(p=>{if(p==='granted')setTimeout(()=>new Notification('⏰ Axis Reminder',{body:task.name}),diff);});
    setTimeout(()=>showToast(task.name),diff);
  }
  function showToast(msg){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),5000);}

  // ── RICH TEXT EDITOR ──

  // Convert editor HTML to markdown string for storage
  function editorToMarkdown(el){
    let md = '';
    el.childNodes.forEach(node=>{
      if(node.nodeType===3){ // text node
        md += node.textContent;
      } else if(node.nodeName==='DIV'||node.nodeName==='P'||node.nodeName==='BR'){
        md += '\n' + nodeToMd(node);
      } else {
        md += nodeToMd(node);
      }
    });
    return md.trim();
  }

  function nodeToMd(node){
    if(node.nodeType===3) return node.textContent;
    const tag = node.nodeName;
    if(tag==='BR') return '\n';
    if(tag==='STRONG'||tag==='B') return '**'+node.innerText+'**';
    if(tag==='H1') return '# '+node.innerText+'\n';
    if(tag==='H2') return '## '+node.innerText+'\n';
    if(tag==='UL'){
      let s='';
      node.querySelectorAll('li').forEach(li=>{
        if(li.classList.contains('cb-wrap')){
          const checked = li.querySelector('input')?.checked;
          const txt = li.querySelector('.cb-text')?.innerText||'';
          s += (checked?'[x] ':'[] ')+txt+'\n';
        } else {
          s += '- '+li.innerText+'\n';
        }
      });
      return s;
    }
    if(tag==='OL'){
      let s=''; let i=1;
      node.querySelectorAll('li').forEach(li=>{s+=(i++)+'. '+li.innerText+'\n';});
      return s;
    }
    if(tag==='LI'){
      if(node.classList.contains('cb-wrap')){
        const checked = node.querySelector('input')?.checked;
        const txt = node.querySelector('.cb-text')?.innerText||'';
        return (checked?'[x] ':'[] ')+txt+'\n';
      }
      return node.innerText;
    }
    if(tag==='DIV'||tag==='P'){
      const inner = node.innerHTML;
      // heading
      if(node.getAttribute('data-type')==='h1') return '# '+node.innerText+'\n';
      if(node.getAttribute('data-type')==='h2') return '## '+node.innerText+'\n';
      return node.innerText+'\n';
    }
    return node.innerText||'';
  }

  // Convert markdown to HTML for display
  function markdownToHtml(md){
    if(!md) return '';
    const lines = md.split('\n');
    let html = '';
    let inUl=false, inOl=false;
    const closeList=()=>{
      if(inUl){html+='</ul>';inUl=false;}
      if(inOl){html+='</ol>';inOl=false;}
    };
    lines.forEach(line=>{
      // checkbox
      if(/^\[x\] /i.test(line)){
        if(!inUl){closeList();html+='<ul style="list-style:none;padding-left:0">';inUl=true;}
        html+=`<li class="cb-wrap"><input type="checkbox" checked onclick="this.closest('li').querySelector('.cb-text').classList.toggle('checked',this.checked)"><span class="cb-text checked">${inlineFormat(line.slice(4))}</span></li>`;
      } else if(/^\[\] /.test(line)){
        if(!inUl){closeList();html+='<ul style="list-style:none;padding-left:0">';inUl=true;}
        html+=`<li class="cb-wrap"><input type="checkbox" onclick="this.closest('li').querySelector('.cb-text').classList.toggle('checked',this.checked)"><span class="cb-text">${inlineFormat(line.slice(3))}</span></li>`;
      // bullet
      } else if(/^- /.test(line)||/^\* /.test(line)){
        if(!inUl){closeList();html+='<ul>';inUl=true;}
        html+=`<li>${inlineFormat(line.slice(2))}</li>`;
      // numbered
      } else if(/^\d+\. /.test(line)){
        if(!inOl){closeList();html+='<ol>';inOl=true;}
        html+=`<li>${inlineFormat(line.replace(/^\d+\. /,''))}</li>`;
      // h1
      } else if(/^# /.test(line)){
        closeList();
        html+=`<h1>${inlineFormat(line.slice(2))}</h1>`;
      // h2
      } else if(/^## /.test(line)){
        closeList();
        html+=`<h2>${inlineFormat(line.slice(3))}</h2>`;
      // blank
      } else if(line.trim()===''){
        closeList();
        html+='<br>';
      } else {
        closeList();
        html+=`<div>${inlineFormat(line)}</div>`;
      }
    });
    closeList();
    return html;
  }

  // Convert markdown to editor HTML (for editing existing cards)
  function markdownToEditor(md){
    return markdownToHtml(md);
  }

  // Inline formatting: **bold**
  function inlineFormat(text){
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  }

  // Auto-format triggers as user types
  function initEditor(el){
    el.addEventListener('keydown', e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        const sel = window.getSelection();
        const range = sel.getRangeAt(0);
        const block = getBlock(range.startContainer);

        // Continue numbered list
        if(block && block.parentNode && block.parentNode.nodeName==='OL'){
          const li = block.nodeName==='LI'?block:block.closest('li');
          if(li && li.innerText.trim()===''){
            // empty item — exit list
            const ol = li.parentNode;
            const div = document.createElement('div');
            div.innerHTML='<br>';
            ol.parentNode.insertBefore(div,ol.nextSibling);
            li.remove();
            if(ol.children.length===0) ol.remove();
            moveCursorTo(div);
          } else {
            const newLi = document.createElement('li');
            newLi.innerHTML='<br>';
            li.parentNode.insertBefore(newLi, li.nextSibling);
            moveCursorTo(newLi);
          }
          return;
        }

        // Continue bullet list
        if(block && block.nodeName==='LI' && block.parentNode.nodeName==='UL' && !block.classList.contains('cb-wrap')){
          if(block.innerText.trim()===''){
            const ul = block.parentNode;
            const div = document.createElement('div');
            div.innerHTML='<br>';
            ul.parentNode.insertBefore(div,ul.nextSibling);
            block.remove();
            if(ul.children.length===0) ul.remove();
            moveCursorTo(div);
          } else {
            const newLi = document.createElement('li');
            newLi.innerHTML='<br>';
            block.parentNode.insertBefore(newLi, block.nextSibling);
            moveCursorTo(newLi);
          }
          return;
        }

        // Default — insert div
        const div = document.createElement('div');
        div.innerHTML='<br>';
        range.deleteContents();
        range.insertNode(div);
        moveCursorTo(div);
      }

      // Backspace on empty list item exits list
      if(e.key==='Backspace'){
        const sel = window.getSelection();
        if(!sel.rangeCount) return;
        const range = sel.getRangeAt(0);
        const block = getBlock(range.startContainer);
        if(block && (block.nodeName==='LI') && block.innerText.trim()===''){
          e.preventDefault();
          const parent = block.parentNode;
          const div = document.createElement('div');
          div.innerHTML='<br>';
          parent.parentNode.insertBefore(div, parent.nextSibling);
          block.remove();
          if(parent.children.length===0) parent.remove();
          moveCursorTo(div);
        }
      }
    });

    el.addEventListener('input', ()=>{
      const sel = window.getSelection();
      if(!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      const node = range.startContainer;
      const block = getBlock(node);
      if(!block) return;
      const text = block.textContent || block.innerText || '';

      // Trigger: "# " → h1
      if(text==='# '){
        const h = document.createElement('h1');
        h.setAttribute('data-type','h1');
        h.innerHTML='<br>';
        block.parentNode.replaceChild(h,block);
        moveCursorTo(h); return;
      }
      // Trigger: "## " → h2
      if(text==='## '){
        const h = document.createElement('h2');
        h.setAttribute('data-type','h2');
        h.innerHTML='<br>';
        block.parentNode.replaceChild(h,block);
        moveCursorTo(h); return;
      }
      // Trigger: "- " or "* " → bullet list
      if(text==='- '||text==='* '){
        const ul = document.createElement('ul');
        const li = document.createElement('li');
        li.innerHTML='<br>';
        ul.appendChild(li);
        block.parentNode.replaceChild(ul,block);
        moveCursorTo(li); return;
      }
      // Trigger: "1. " → numbered list
      if(/^\d+\. $/.test(text)){
        const ol = document.createElement('ol');
        const li = document.createElement('li');
        li.innerHTML='<br>';
        ol.appendChild(li);
        block.parentNode.replaceChild(ol,block);
        moveCursorTo(li); return;
      }
      // Trigger: "[] " → checkbox
      if(text==='[] '){
        const ul = document.createElement('ul');
        ul.style='list-style:none;padding-left:0';
        const li = document.createElement('li');
        li.className='cb-wrap';
        const cb = document.createElement('input');
        cb.type='checkbox';
        cb.style='margin-top:4px;accent-color:var(--accent2);width:15px;height:15px;flex-shrink:0;cursor:pointer';
        cb.addEventListener('change',function(){
          const span=this.nextElementSibling;
          if(span) span.classList.toggle('checked',this.checked);
        });
        const span = document.createElement('span');
        span.className='cb-text';
        span.contentEditable='true';
        span.innerHTML='<br>';
        li.appendChild(cb);
        li.appendChild(span);
        ul.appendChild(li);
        block.parentNode.replaceChild(ul,block);
        moveCursorTo(span); return;
      }
    });
  }

  function getBlock(node){
    if(!node) return null;
    if(node.nodeType===3) return getBlock(node.parentNode);
    const tag = node.nodeName;
    if(['DIV','P','LI','H1','H2','SPAN'].includes(tag)) return node;
    return getBlock(node.parentNode);
  }

  function moveCursorTo(el){
    const range = document.createRange();
    const sel = window.getSelection();
    range.selectNodeContents(el);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
    el.focus();
  }

  // ── INIT ──
  async function initApp(){
    loadStart();
    if(Notification.permission==='default') Notification.requestPermission();
    try{
      const [cd, td] = await Promise.all([
        dbGet('cards','order=created_at.asc'),
        dbGet('tasks','order=created_at.asc')
      ]);
      cards = Array.isArray(cd)?cd:[];
      tasks = Array.isArray(td)?td:[];
      const now = new Date();
      tasks.forEach(t=>{if(t.date&&t.time&&!t.done&&new Date(`${t.date}T${t.time}`)>now)scheduleReminder(t);});
    } catch(e){
      // If loading data fails due to auth, sign out cleanly
      if(e.message && (e.message.includes('expired') || e.message.includes('401') || e.message.includes('JWT'))){
        signOut(); return;
      }
      console.error('Load error',e);
    }
    loadDone();
    const isMobile = window.innerWidth < 640;
    switchSection(isMobile?'Tasks':'Work', isMobile?'tasks':'board');
    updateTaskBadge();
  }

  // ── STAR BACKGROUND ──
  (function(){
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, stars=[];
    const COUNT = 80;

    function resize(){
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function randomStar(){
      return {
        x: Math.random()*W,
        y: Math.random()*H,
        r: Math.random()*1.8+0.4,        // radius
        speed: Math.random()*0.18+0.04,  // drift speed rightward
        angle: Math.random()*Math.PI*2,  // current rotation angle
        rotSpeed: (Math.random()-0.5)*0.006, // rotation speed
        orbit: Math.random()*12+4,       // orbit radius around its path
        orbitPhase: Math.random()*Math.PI*2,
        orbitSpeed: Math.random()*0.012+0.004,
        opacity: Math.random()*0.5+0.25,
        pulse: Math.random()*Math.PI*2,
        pulseSpeed: Math.random()*0.02+0.008,
      };
    }

    function init(){
      resize();
      stars = Array.from({length:COUNT}, randomStar);
    }

    function getThemeColor(){
      return getComputedStyle(document.documentElement)
        .getPropertyValue('--accent2').trim() || '#c8ff00';
    }

    function hexToRgb(hex){
      hex = hex.replace('#','');
      if(hex.length===3) hex=hex.split('').map(c=>c+c).join('');
      const n=parseInt(hex,16);
      return [(n>>16)&255,(n>>8)&255,n&255];
    }

    function draw(){
      ctx.clearRect(0,0,W,H);
      const color = getThemeColor();
      const [r,g,b] = hexToRgb(color);

      stars.forEach(s=>{
        // drift right slowly
        s.x += s.speed;
        // orbital wobble (earth-like rotation around path)
        s.orbitPhase += s.orbitSpeed;
        s.angle += s.rotSpeed;
        s.pulse += s.pulseSpeed;

        const ox = Math.cos(s.orbitPhase) * s.orbit;
        const oy = Math.sin(s.orbitPhase) * s.orbit * 0.35; // flattened ellipse
        const px = s.x + ox;
        const py = s.y + oy;

        // pulse opacity gently
        const op = s.opacity * (0.7 + 0.3*Math.sin(s.pulse));

        // wrap around screen
        if(s.x > W + 20) s.x = -20;

        // draw star shape (4-point)
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(s.angle);
        ctx.globalAlpha = op;

        const sr = s.r;
        ctx.beginPath();
        for(let i=0;i<8;i++){
          const ang = (i*Math.PI)/4;
          const rad = i%2===0 ? sr*2.2 : sr*0.9;
          if(i===0) ctx.moveTo(Math.cos(ang)*rad, Math.sin(ang)*rad);
          else ctx.lineTo(Math.cos(ang)*rad, Math.sin(ang)*rad);
        }
        ctx.closePath();
        ctx.fillStyle = `rgba(${r},${g},${b},${op})`;
        ctx.fill();

        // soft glow
        const glow = ctx.createRadialGradient(0,0,0,0,0,sr*5);
        glow.addColorStop(0, `rgba(${r},${g},${b},${op*0.25})`);
        glow.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.beginPath();
        ctx.arc(0,0,sr*5,0,Math.PI*2);
        ctx.fillStyle = glow;
        ctx.fill();

        ctx.restore();
      });

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    init();
    draw();
  })();

  // ── STARTUP — check OAuth callback first, then saved token ──
  (async()=>{
    // 1. Check if we're returning from Google login (tokens in URL hash)
    const fromOAuth = await handleOAuthCallback();
    if(fromOAuth){ showApp(); return; }

    // 2. Try saved session
    if(accessToken && currentUserId){
      const refresh = localStorage.getItem('axis_refresh');
      if(refresh){
        const ok = await refreshToken();
        if(ok){ showApp(); return; }
        signOut(); return;
      }
      // No refresh token — check if existing token still valid
      try{
        const r = await fetch(`${BASE}/auth/v1/user`, {
          headers:{'apikey':ANON,'Authorization':'Bearer '+accessToken}
        });
        if(r.ok){ showApp(); } else { signOut(); }
      } catch(e){ showApp(); }
    }
  })();
</script>
